<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Recorder - Gravador Profissional</title>
  <link rel="stylesheet" href="ui/styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Cabeçalho -->
    <header class="app-header">
      <h1>Screen Recorder Studio</h1>
      <p class="subtitle">Gravação profissional com composição multi-formato</p>
    </header>

    <!-- Controles Principais -->
    <main class="main-content">
      <!-- Painel de Configuração -->
      <section class="config-panel">
        <h2>Configuração</h2>
        
        <!-- Seletor de Formato -->
        <div class="form-group">
          <label for="format-select">Formato do Vídeo:</label>
          <select id="format-select" class="form-control">
            <option value="TIKTOK" selected>TikTok (9:16 - 1080x1920)</option>
            <option value="SHORTS">Shorts/Reels (9:16 - 1080x1920)</option>
            <option value="YOUTUBE">YouTube (16:9 - 1920x1080)</option>
          </select>
        </div>

        <!-- Seletor de Layout -->
        <div class="form-group">
          <label for="layout-select">Layout:</label>
          <select id="layout-select" class="form-control">
            <option value="SCREEN_PLUS_WEBCAM_CORNER">Tela + Webcam (Canto)</option>
            <option value="SCREEN_PLUS_WEBCAM_TOP">Tela + Webcam (Topo)</option>
            <option value="SCREEN_ONLY">Apenas Tela</option>
            <option value="WEBCAM_ONLY">Apenas Webcam</option>
          </select>
        </div>

        <!-- Qualidade -->
        <div class="form-group">
          <label for="quality-select">Qualidade:</label>
          <select id="quality-select" class="form-control">
            <option value="LOW">Baixa (1 Mbps)</option>
            <option value="MEDIUM">Média (2.5 Mbps)</option>
            <option value="HIGH" selected>Alta (5 Mbps)</option>
            <option value="ULTRA">Ultra (10 Mbps)</option>
          </select>
        </div>

        <!-- Checkboxes -->
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="webcam-enabled" checked>
            Habilitar Webcam
          </label>
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="microphone-enabled" checked>
            Capturar Microfone
          </label>
        </div>

        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="system-audio-enabled">
            Capturar Áudio do Sistema
          </label>
        </div>

        <!-- FPS -->
        <div class="form-group">
          <label for="fps-select">FPS:</label>
          <select id="fps-select" class="form-control">
            <option value="24">24 FPS</option>
            <option value="30" selected>30 FPS</option>
            <option value="60">60 FPS</option>
          </select>
        </div>

        <!-- Nome do Projeto -->
        <div class="form-group">
          <label for="project-name">Nome do Projeto:</label>
          <input type="text" id="project-name" class="form-control" value="meu_video" placeholder="Nome do arquivo">
        </div>
      </section>

      <!-- Preview -->
      <section class="preview-panel">
        <h2>Preview</h2>
        <div id="preview-container" class="preview-container">
          <div class="preview-placeholder">
            <p>Preview aparecerá aqui</p>
          </div>
        </div>

        <!-- Status -->
        <div class="status-bar">
          <span id="status-text">Status: Pronto</span>
          <span id="duration-text">Duração: 00:00</span>
        </div>
      </section>

      <!-- Controles de Gravação -->
      <section class="controls-panel">
        <h2>Controles</h2>
        
        <div class="button-group">
          <button id="btn-init" class="btn btn-primary">Inicializar</button>
          <button id="btn-start" class="btn btn-success" disabled>Iniciar Gravação</button>
          <button id="btn-stop" class="btn btn-danger" disabled>Parar Gravação</button>
          <button id="btn-export" class="btn btn-warning" disabled>Exportar</button>
        </div>

        <!-- Barra de Progresso de Exportação -->
        <div id="export-progress-container" class="progress-container" style="display: none;">
          <label>Exportando...</label>
          <div class="progress-bar">
            <div id="export-progress-bar" class="progress-fill"></div>
          </div>
          <span id="export-progress-text">0%</span>
        </div>
      </section>

      <!-- Informações -->
      <section class="info-panel">
        <h3>Informações</h3>
        <div id="devices-info" class="info-content">
          <p>Dispositivos disponíveis aparecerão aqui</p>
        </div>
      </section>
    </main>

    <!-- Rodapé -->
    <footer class="app-footer">
      <p>Screen Recorder Studio - Desenvolvido com orientação  a objetos | DELIMA</p>
    </footer>
  </div>

  <script type="module" src="ui/app.js"></script>
</body>
</html>
