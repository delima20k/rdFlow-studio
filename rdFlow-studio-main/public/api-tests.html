<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streaming Local - RTMP para HLS</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --text: #e2e8f0;
      --accent: #22c55e;
      --muted: #94a3b8;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #1d4ed8, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .container {
      width: min(960px, 100%);
      background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 16px;
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    h1 { margin: 0 0 8px; }

    .header-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .btn-back {
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.3);
      color: #60a5fa;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-back:hover {
      background: rgba(59, 130, 246, 0.25);
      border-color: rgba(59, 130, 246, 0.5);
      transform: translateX(-2px);
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    input, button {
      border: 1px solid rgba(148, 163, 184, 0.3);
      border-radius: 10px;
      padding: 12px;
      font-size: 15px;
    }

    input {
      background: #0b1220;
      color: var(--text);
      width: 100%;
    }

    button {
      background: #111827;
      color: var(--text);
      cursor: pointer;
      transition: 180ms ease;
    }

    button:hover { transform: translateY(-2px); }

    .btn-primary { background: var(--accent); color: #052e16; font-weight: 700; }
    .btn-danger { background: var(--danger); color: #fee2e2; }

    #result {
      border-left: 4px solid var(--accent);
      background: rgba(15, 23, 42, 0.8);
      color: var(--muted);
      padding: 12px;
      min-height: 52px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    video {
      width: 100%;
      max-height: 420px;
      border-radius: 10px;
      background: #000;
    }

    @media (max-width: 360px) {
      .container { padding: 14px; }
      button, input { font-size: 14px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="header-nav">
      <a href="/" class="btn-back">← Voltar ao Estúdio</a>
    </div>

    <section>
      <h1>Streaming API - Teste Local</h1>
      <p>Fluxo: criar stream -> iniciar ingestao RTMP -> enviar sinal no OBS -> reproduzir HLS.</p>
    </section>

    <section class="grid">
      <input id="stream-title" type="text" placeholder="Titulo da transmissao" />
      <button id="create-stream" class="btn-primary">Criar Stream</button>
      <input id="stream-id" type="text" placeholder="Stream ID" />
      <button id="start-ingest">Iniciar Ingestao RTMP</button>
      <button id="stop-ingest" class="btn-danger">Parar Ingestao</button>
      <button id="play-stream">Reproduzir HLS</button>
    </section>

    <section id="result">Aguardando acao...</section>

    <section>
      <video id="live-player" controls autoplay muted playsinline></video>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
